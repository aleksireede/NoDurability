# Prevent dropped items from burning in fire or lava.
prevent-item-combustion: false

# Legacy option kept for backwards compatibility.
# combust-items: true

# How often online player inventories are repaired automatically.
player-auto-repair-interval-ticks: 1

# How often loaded hopper inventories are scanned and repaired automatically.
hopper-auto-repair-interval-ticks: 20

# You can change the messages to whatever you want and support different languages.
lang:
  reset-durability-message: "The durability of all items in your inventory was reset"
  only-a-player: "§cOnly a Player can do this!"
  reset-durability-item: "The durability of the item was reset"

  papi:
    no-durability: "§cNo Durability!§r"
